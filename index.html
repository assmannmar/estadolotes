
<!DOCTYPE html>
<html>
<head>
    <title>Islas - Barrios Nauticos. Isla Victoria. Disponibilidad. Inmobiliaria Cadema</title>
    <link rel="shortcut icon" type="image/png" href="/images/favicon.ico"/>
	
	<script>
		
		const requestURL = 'https://sheets.googleapis.com/v4/spreadsheets/1d8A8O7mvtTf8zrKHMWX3lwRXDUW9q48yZQ6w_Glo6Lg/values/Lotes!A:H?key=AIzaSyCenWkgYwdCzmfF-HIba5Osoi7XDA8y4TM';
		
		const request = new XMLHttpRequest();
		
		request.open('GET', requestURL);
		
		request.responseType = 'json';
		request.send();
		
		request.onload = function() {
		  const listaLotes = request.response;
		
				for (var i = 1; i < 253; i++) {
					const loteIdBruto = i ;
					const loteId = loteIdBruto.toString();

          const loteFound = listaLotes.values.find( unidad => unidad[0] === loteId);
          if (loteFound !== undefined ) {
          const lote = document.getElementById(loteId);

          lote.addEventListener("mouseover", mouseOver(listaLotes));
          lote.addEventListener("mouseout", mouseOut);

          const estado = loteFound[4];

            if (estado == "Disponible") {
              lote.setAttribute("fill-opacity", "0.2");
              lote.setAttribute("fill", "#d9d5af")
              }
            else if (estado == "Reservado") {
              lote.setAttribute("fill-opacity", "0.5");
              lote.setAttribute("fill", "#ff0")
              }
            else if (estado == "Vendido") {
              lote.setAttribute("fill-opacity", "0.5");
              lote.setAttribute("fill", "#f00")
              }
            else if (estado == "No Disponible") {
              lote.setAttribute("fill-opacity", "0.5");
              lote.setAttribute("fill", "#000")
              }
            else if (estado == "Desarrollador") {
              lote.setAttribute("fill-opacity", "0.5");
              lote.setAttribute("fill", "#f00")
              }
					}
          else continue


        }   
        // let bandera = document.getElementById('svgcardaleschico');
        let bandera2 = document.getElementById('loader-container');
        // bandera.style.visibility = "visible";
        bandera2.style.display = "none";
    }
    
    
    const onMouseMove = (e) =>{
      let ventana = document.getElementById('detalle');
      ventana.style.left = (e.clientX + 10) + 'px';
      ventana.style.top = (e.clientY + 10) + 'px';
    }
    document.addEventListener('mousemove', onMouseMove);



    function mouseOver(listaLotes) {

      document.querySelectorAll(".lotemapa").forEach(el => {
        el.addEventListener("mouseover", e => {
          const id = e.target.getAttribute("id");

          const loteFound = listaLotes.values.find( unidad => unidad[0] === id);

          let valor = 0;
          let anticipo = 0;
          let ventana = document.getElementById('detalle');
          if (loteFound[4] == "Disponible") {
             valor = loteFound[5];
             anticipo = loteFound[6];
             cuotas = loteFound[7]
          }  
          else {  
            valor = "";
            anticipo = "";
            cuotas = ""
          };
          ventana.innerHTML = "<p> Lote: <b>" + loteFound[0] + " </b></p> <p> Superficie: <b>" + loteFound[1] + " m2</b></p> <p> Calado: <b>" + loteFound[2] + " m</b></p> <p> Metros de Costa: <b>" + loteFound[3] + " m</b></p> <p> Estado: <b>" + loteFound[4] + " </b></p> <p> Valor: <b>" + valor + " </b></p> <p> Anticipo desde: <b> US$ 15,000 </b></p> <p> Saldo en hasta: <b> 48 cuotas </b></p>";
          ventana.style.visibility = "visible";

        });
      });

    }


    function mouseOut() {

        let ventana = document.getElementById('detalle');
        ventana.style.visibility = "hidden";
        ventana.innerHTML = "";


    }
	
	</script>
